# Fly.io configuration — single app serving the Next.js frontend with the
# Go API proxied behind it (see root Dockerfile).
#
# Before first deploy:
#   fly launch --no-deploy            # creates the app (pick your own name)
#   fly postgres create / attach      # provides DATABASE_URL secret
#   fly secrets set JWT_SECRET=...    # min 32 chars
#   fly volumes create taskflow_uploads --size 1
#   fly deploy

app = "taskflow"
primary_region = "fra"

[build]
  dockerfile = "Dockerfile"

[env]
  UPLOAD_DIR = "/data/uploads"
  JWT_EXPIRY_HOURS = "24"
  MAX_UPLOAD_BYTES = "10485760"

[mounts]
  source = "taskflow_uploads"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = "stop"
