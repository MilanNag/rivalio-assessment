# fly.toml app configuration file generated for rivalio-assessment on 2026-06-11T11:25:12Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'rivalio-assessment'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[env]
  JWT_EXPIRY_HOURS = '24'
  MAX_UPLOAD_BYTES = '10485760'
  UPLOAD_DIR = '/data/uploads'

[[mounts]]
  source = 'taskflow_uploads'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '15s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
