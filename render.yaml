# Render Blueprint — deploys the whole app with one click.
# https://render.com/docs/blueprint-spec
#
# One Docker web service (Go API + Next.js in a single container, see
# Dockerfile) plus a managed PostgreSQL instance. Migrations run
# automatically when the API boots.

services:
  - type: web
    name: taskflow
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true # Render generates a strong random value
      - key: JWT_EXPIRY_HOURS
        value: "24"
      - key: MAX_UPLOAD_BYTES
        value: "10485760"
      - key: UPLOAD_DIR
        value: /data/uploads
    # Attachments are stored on local disk. The free plan has no persistent
    # disk, so uploads are lost on redeploy/restart. To persist them, move to
    # a paid plan and uncomment:
    # disk:
    #   name: taskflow-uploads
    #   mountPath: /data
    #   sizeGB: 1

databases:
  - name: taskflow-db
    plan: free
    databaseName: taskflow
    user: taskflow
